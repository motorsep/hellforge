name: Linux

on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Linux x86_64
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq gettext pkg-config zlib1g-dev libjpeg-dev libxml2-dev libsigc++-2.0-dev
          sudo apt-get install -yq libgtest-dev libeigen3-dev libwxgtk3.2-dev libpng-dev
          sudo apt-get install -yq libftgl-dev libglew-dev libalut-dev libvorbis-dev python3-dev libgit2-dev libglib2.0-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install-root

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install
        run: cmake --build build --target install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hellforge-linux-x86_64
          path: install-root/
